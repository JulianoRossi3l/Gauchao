<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauchão Restaurante | Pro</title>
    
    <!-- SEO & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Scripts para o Efeito de Partículas (Vanta.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <style>
        :root {
            --neon-pink: #ff007f;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.85); /* Efeito de Vidro */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Container do Background Animado */
        #vanta-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Fica atrás de tudo */
        }

        .container { 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            padding: 20px;
            z-index: 1;
        }

        /* Header e Logo */
        header { margin: 15px 0 25px; }
        .logo-container {
            width: 100%;
            max-width: 180px; 
            margin: 0 auto;
            /* Filtro para garantir que a logo apareça bem sobre o fundo escuro se necessário */
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }
        .logo-container img { width: 100%; height: auto; }

        /* Botões Estilo Glassmorphism (Vidro) */
        .btn-site {
            background-color: var(--neon-pink); /* Site ganha a cor do Neon */
            color: var(--white);
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-bottom: 12px;
            gap: 10px;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            transition: 0.3s;
        }

        .social-grid {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 25px;
        }
        .social-item {
            background: var(--glass);
            backdrop-filter: blur(10px); /* Desfoque atrás do botão */
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.5rem;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .btn-save {
            background-color: rgba(0, 0, 0, 0.7);
            color: var(--white);
            text-decoration: none;
            padding: 15px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 700;
            border: 1px solid var(--neon-pink);
            margin-bottom: 30px;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
        }

        .social-item:active, .btn-site:active, .btn-save:active { transform: scale(0.95); }

        /* Carrossel Parceiros */
        .partners-section {
            background: var(--glass);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 15px 0;
            overflow: hidden;
        }
        .partners-title {
            font-size: 0.65rem;
            font-weight: 700;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .slider { display: flex; width: calc(130px * 28); animation: scroll 40s linear infinite; }
        .slider img { width: 100px; height: 50px; object-fit: contain; margin: 0 15px; }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-130px * 14)); }
        }

        footer { margin: 30px 0 20px; font-size: 0.7rem; color: rgba(255,255,255,0.6); }
    </style>
</head>
<body>

    <!-- Div onde a animação será aplicada -->
    <div id="vanta-bg"></div>

    <div class="container">
        <header>
            <div class="logo-container">
                <!-- Usando o link da sua logo completa -->
                <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2023/11/LOGO-BRANCA.png" alt="Logotipo Gauchão">
            </div>
        </header>

        <main>
            <a href="https://gauchaoindustrial.com.br/" class="btn-site">
                <i class="fas fa-globe"></i> VISITE NOSSO SITE

            <nav class="social-grid">
                <a href="https://wa.me/5567998500310" class="social-item">
                    <i class="fab fa-whatsapp" style="color: #25D366;"></i>

                <a href="javascript:void(0)" onclick="openApp('instagram://user?username=gauchaoindustrial', 'https://www.instagram.com/_u/gauchaoindustrial/')" class="social-item">

                </a>
                <a href="javascript:void(0)" onclick="openApp('fb://facename/gauchaoindustrial', 'https://www.facebook.com/gauchaoindustrial')" class="social-item">
                    <i class="fab fa-facebook" style="color: #1877F2;"></i>

                <a href="javascript:void(0)" onclick="openApp('linkedin://company/gauchão-restaurante-e-cozinha-industrial', 'https://br.linkedin.com/company/gauch%C3%A3o-restaurante-e-cozinha-industrial')" class="social-item">
                    <i class="fab fa-linkedin" style="color: #0077B5;"></i>
                </a>
                <a href="https://share.google/MgowF4yCEKVHnhTk" class="social-item">
                    <i class="fas fa-map-marker-alt" style="color: #EA4335;"></i>
                </a>
            </nav>

            <a href="#" class="btn-save" onclick="downloadVCard(); return false;">
                <i class="fas fa-user-plus"></i> SALVAR CONTATO NA AGENDA
            </a>

            <section class="partners-section">
                <p class="partners-title">Empresas que confiam em nós</p>
                <div class="slider">
                    <!-- Logos dos parceiros -->
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2025/07/image-12.fw_.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2025/07/image-11.fw_.png">

                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-5-2.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-4-2.png">

                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-9-3.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-10-2.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/parcetec-logo-2.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-8-2.png">
                    <!-- Repetição para Loop -->
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2025/07/image-12.fw_.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2025/07/image-11.fw_.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-13.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-1-2.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-2-2.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-5-2.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-4-2.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-3-2.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-6-2.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-7-3.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-9-3.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-10-2.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/parcetec-logo-2.png">
                    <img src="https://gauchaoindustrial.com.br/wp-content/uploads/2024/05/image-8-2.png">
                </div>
            </section>
        </main>

        <footer>
            &copy; Gauchão Restaurante e Cozinha Industrial
        </footer>
    </div>

    <script>
        // Inicialização do Vanta.js NET
        VANTA.NET({
          el: "#vanta-bg",
          mouseControls: true,
          touchControls: true,
          gyroControls: false,
          minHeight: 200.00,
          minWidth: 200.00,
          scale: 1.00,
          scaleMobile: 1.00,
          color: 0xff007f, // ROSA NEON
          backgroundColor: 0x050505, // FUNDO QUASE PRETO PARA O NEON BRILHAR
          points: 12.00, // DENSIDADE DE PONTOS
          maxDistance: 20.00,
          spacing: 16.00
        });

        // Scripts de funcionalidade
        function openApp(appUrl, webUrl) {
            const start = Date.now();
            window.location.href = appUrl;
            setTimeout(() => {
                if (Date.now() - start < 1000) { window.location.href = webUrl; }
            }, 600);
        }

        function downloadVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Gauchão Industrial
ORG:Gauchão Restaurante e Cozinha Industrial
TEL;TYPE=WORK,VOICE:+5567998500310
ADR;TYPE=WORK:;;Avenida Sobral, 310;Três Lagoas;MS;79630-660;Brazil
URL:https://gauchaoindustrial.com.br/
END:VCARD`;
            const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.download = "Gauchao_Industrial.vcf";
            link.href = url;
            link.click();
        }
    </script>
</body>
</html>
