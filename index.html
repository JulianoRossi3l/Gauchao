    <style>
        :root {
            --primary: #000000;
            --bg: #f8f9fa;
            --white: #ffffff;
            --border: #eeeeee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg); 
            color: #333; 
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 420px; text-align: center; }

        /* AJUSTE DO TAMANHO DO LOGOTIPO AQUI */
        header { 
            margin: 10px 0 25px; 
            display: flex;
            justify-content: center;
        }
        .logo-container {
            width: 100%;
            max-width: 180px; /* <--- MUDE ESTE VALOR (ex: 150px ou 220px) PARA AJUSTAR O TAMANHO */
        }
        .logo-container img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        /* Botão Site */
        .btn-site {
            background-color: var(--primary);
            color: var(--white);
            text-decoration: none;
            padding: 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-bottom: 12px;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Grade de Ícones */
        .social-grid {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 25px;
        }
        .social-item {
            background: var(--white);
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 8px rgba(0,0,0,0.03);
        }
        .social-item:active, .btn-site:active, .btn-save:active { transform: scale(0.95); }

        /* Salvar Contato */
        .btn-save {
            background-color: #e8f5e9;
            color: var(--primary);
            text-decoration: none;
            padding: 15px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 700;
            border: 2px solid var(--primary);
            margin-bottom: 30px;
        }

        /* Carrossel Parceiros */
        .partners-section {
            background: var(--white);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 15px 0;
            overflow: hidden;
        }
        .partners-title {
            font-size: 0.65rem;
            font-weight: 700;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .slider { display: flex; width: calc(130px * 28); animation: scroll 40s linear infinite; }
        .slider img { width: 100px; height: 50px; object-fit: contain; margin: 0 15px; }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-130px * 14)); }
        }

        footer { margin: 30px 0 20px; font-size: 0.7rem; color: #aaa; }
    </style>

    <script>
        function openApp(appUrl, webUrl) {
            const start = Date.now();
            window.location.href = appUrl;
            setTimeout(() => {
                if (Date.now() - start < 1000) {
                    window.location.href = webUrl;
                }
            }, 600);
        }

        function downloadVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Gauchão Industrial
ORG:Gauchão Restaurante e Cozinha Industrial
TEL;TYPE=WORK,VOICE:+5567998500310
ADR;TYPE=WORK:;;Avenida Sobral, 310;Três Lagoas;MS;79630-660;Brazil
URL:https://gauchaoindustrial.com.br/
END:VCARD`;
            const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.download = "Gauchao_Industrial.vcf";
            link.href = url;
            link.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
