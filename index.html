<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauchão Restaurante e Cozinha Industrial</title>
    
    <!-- SEO & Metadados -->
    <meta name="description" content="Gauchão Industrial: Especialista em alimentação coletiva e soluções de cozinha industrial em Três Lagoas - MS.">
    <link rel="canonical" href="https://gauchaoindustrial.com.br/">
    <meta property="og:image" content="https://gauchaoindustrial.com.br/wp-content/uploads/2023/11/LOGO-BRANCA.png">

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Vanta.js Animado -->

    <style>
        :root {
            --neon-pink: #ff007f;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.88);
            --google-blue: #4285F4;
            --accent-color: #f1c40f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; background-color: #050505; }

        #vanta-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .container { width: 100%; max-width: 420px; text-align: center; padding: 20px; z-index: 1; }

        /* Header e Logo */
        header { margin-bottom: 20px; }
        .logo-container { width: 100%; max-width: 190px; margin: 0 auto; filter: drop-shadow(0 0 8px rgba(255,255,255,0.2)); }
        .logo-container img { width: 100%; height: auto; }

        /* Selo Google (RE-ADICIONADO) */
        .google-card {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 18px; margin-bottom: 20px;
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: #333; border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .rating-header { color: var(--google-blue); font-weight: 700; font-size: 0.75rem; display: flex; align-items: center; gap: 6px; text-transform: uppercase; }
        .stars { color: var(--accent-color); font-size: 1.1rem; margin: 4px 0; }
        .review-count { font-size: 0.75rem; color: #666; font-weight: 600; }

        /* Botões */
        .btn-site {
            background-color: var(--neon-pink); color: var(--white);
            text-decoration: none; padding: 18px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; margin-bottom: 12px; gap: 10px;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4); transition: 0.3s;
        }

        .social-grid { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .social-item {
            background: var(--glass); backdrop-filter: blur(10px);
            width: 100%; aspect-ratio: 1/1; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-size: 1.6rem; border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-save {
            background-color: rgba(0, 0, 0, 0.8); color: var(--white);
            text-decoration: none; padding: 16px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; font-weight: 700; border: 1px solid var(--neon-pink);
            margin-bottom: 25px; font-size: 0.9rem;
        }

        .social-item:active, .btn-site:active, .btn-save:active, .google-card:active { transform: scale(0.95); }

        /* Carrossel Parceiros */
        .partners-section {
            background: var(--glass); backdrop-filter: blur(5px);
            border-radius: 22px; padding: 20px 0; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .partners-title { font-size: 0.65rem; font-weight: 800; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .slider { display: flex; width: calc(140px * 28); animation: scroll 40s linear infinite; }
        .slider img { width: 110px; height: 55px; object-fit: contain; margin: 0 15px; }

        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-140px * 14)); } }

        footer { margin: 30px 0; font-size: 0.7rem; color: rgba(255,255,255,0.5); font-weight: 500; }
    </style>
</head>

        </main>

        <footer>

    <script>
        // Background Animado
        VANTA.NET({
          el: "#vanta-bg",
          mouseControls: true, touchControls: true, gyroControls: false,
          minHeight: 200.00, minWidth: 200.00, scale: 1.00, scaleMobile: 1.00,
          color: 0xff007f, backgroundColor: 0x050505, points: 12.00, maxDistance: 20.00, spacing: 16.00
        });

        // Lógica Apps (Com proteção para Facebook)
        function openApp(appUrl, webUrl) {
            const start = Date.now();
            window.location.href = appUrl;
            setTimeout(() => {
                if (Date.now() - start < 800) { window.location.href = webUrl; }
            }, 500);
        }

        // Salvar Contato
        function downloadVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Gauchão Industrial
ORG:Gauchão Restaurante e Cozinha Industrial
TEL;TYPE=WORK,VOICE:+5567998500310
ADR;TYPE=WORK:;;Avenida Sobral, 310;Três Lagoas;MS;79630-660;Brazil
URL:https://gauchaoindustrial.com.br/
END:VCARD`;
            const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.download = "Gauchao_Industrial.vcf";
            link.href = url;
            link.click();
        }
    </script>
